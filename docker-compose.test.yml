# Lightweight service stack for running API e2e tests locally.
# Uses non-default ports (5433, 6380) so it can coexist with the dev stack.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait   # start
#   npm run test:e2e --prefix apps/api -- --forceExit         # run tests
#   docker compose -f docker-compose.test.yml down            # teardown

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: room_booking_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_booking_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
