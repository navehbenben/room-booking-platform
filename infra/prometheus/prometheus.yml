global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'room-booking-api'
    static_configs:
      - targets:
          - 'api1:3000'
          - 'api2:3000'
          - 'api3:3000'
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
