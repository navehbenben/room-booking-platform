services:
  redis:
    image: redis:7-alpine
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      com.datadoghq.ad.logs: '[{"source":"redis","service":"redis"}]'
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: room_booking
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
    - 5432:5432
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U app -d room_booking
      interval: 5s
      timeout: 3s
      retries: 20
    labels:
      com.datadoghq.ad.logs: '[{"source":"postgresql","service":"postgres"}]'
  api1:
    build:
      context: ./apps/api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://app:app@postgres:5432/room_booking
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CORS_ORIGIN: http://localhost:8080
      REDIS_URL: redis://redis:6379
      INSTANCE_ID: api1
      SEED_ROOMS_COUNT: 500
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev_placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dev_placeholder}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://localhost:3000/health', r=>process.exit(r.statusCode===200?0:1)).on('error',
        ()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 10
    labels:
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"room-booking-api","ddtags":"instance:api1"}]'
  api2:
    build:
      context: ./apps/api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://app:app@postgres:5432/room_booking
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CORS_ORIGIN: http://localhost:8080
      REDIS_URL: redis://redis:6379
      INSTANCE_ID: api2
      SEED_ROOMS_COUNT: 500
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev_placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dev_placeholder}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://localhost:3000/health', r=>process.exit(r.statusCode===200?0:1)).on('error',
        ()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 10
    labels:
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"room-booking-api","ddtags":"instance:api2"}]'
  api3:
    build:
      context: ./apps/api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://app:app@postgres:5432/room_booking
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CORS_ORIGIN: http://localhost:8080
      REDIS_URL: redis://redis:6379
      INSTANCE_ID: api3
      SEED_ROOMS_COUNT: 500
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev_placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dev_placeholder}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://localhost:3000/health', r=>process.exit(r.statusCode===200?0:1)).on('error',
        ()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 10
    labels:
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"room-booking-api","ddtags":"instance:api3"}]'
  api-lb:
    image: nginx:1.27-alpine
    ports:
    - 3001:80
    volumes:
    - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      api3:
        condition: service_healthy
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"api-lb"}]'
  web:
    build:
      context: ./apps/web
    ports:
    - 8080:80
    depends_on:
    - api-lb
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"room-booking-web"}]'
  datadog-agent:
    profiles: [datadog]   # only starts with: docker compose --profile datadog up
    image: gcr.io/datadoghq/agent:7
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_ENV: ${DD_ENV:-production}
      # Container log collection — picks up all containers with com.datadoghq.ad.logs labels
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      # Process and container metrics (CPU, memory, restarts, OOM kills)
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
      # Map the compose service name label to a Datadog tag
      DD_DOCKER_LABELS_AS_TAGS: '{"com.docker.compose.service":"service"}'
    volumes:
      # Docker socket — required for container discovery, log tailing, and process metrics
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host proc/cgroups — required for live process and container resource metrics
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    pid: host
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
    - 9090:9090
    volumes:
    - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.retention.time=7d
    depends_on:
    - api1
    - api2
    - api3
  loki:
    image: grafana/loki:3.1.0
    volumes:
    - ./infra/loki/loki-config.yml:/etc/loki/config.yml:ro
    command: -config.file=/etc/loki/config.yml
  promtail:
    image: grafana/promtail:3.1.0
    volumes:
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    depends_on:
    - loki
  grafana:
    image: grafana/grafana:11.1.0
    ports:
    - 3100:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
    - grafana_data:/var/lib/grafana
    - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
    - prometheus
    - loki
volumes:
  pgdata: null
  grafana_data: null
